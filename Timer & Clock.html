<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer &amp; Clock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #f0f0f0;
      font-family: 'Courier New', Courier, monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow: hidden;
    }

    .panels {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      width: 100%;
    }

    .panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .panel-label {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #555;
    }

    .display {
      font-weight: 700;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      color: #f0f0f0;
      line-height: 1;
      white-space: nowrap;
    }

    .display.running { color: #4ade80; }
    .display.paused  { color: #facc15; }

    #clock-display { color: #60a5fa; }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 8px 20px;
      border: 2px solid currentColor;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background 0.15s;
    }

    button:hover { background: rgba(255,255,255,0.08); }

    #btn-start { color: #4ade80; }
    #btn-pause { color: #facc15; }
    #btn-reset { color: #f87171; }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .input-row label { font-size: 0.75rem; color: #888; letter-spacing: 0.1em; }

    .input-row input {
      width: 56px;
      padding: 4px 6px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #f0f0f0;
      font-family: inherit;
      font-size: 0.9rem;
      text-align: center;
    }

    .input-row input:focus { outline: none; border-color: #60a5fa; }

    #clock-date {
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.1em;
    }

    .divider-h {
      width: 60%;
      height: 1px;
      background: #2a2a2a;
    }

    /* Fixed corners */
    #audio-test {
      position: fixed;
      bottom: 14px;
      left: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.4;
      transition: opacity 0.2s;
    }
    #audio-test:hover { opacity: 1; }
    #audio-test .test-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: #888;
    }
    #audio-test button {
      padding: 3px 9px;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      border-width: 1px;
      color: #a78bfa;
    }

    #volume-control {
      position: fixed;
      bottom: 14px;
      right: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.4;
      transition: opacity 0.2s;
    }
    #volume-control:hover { opacity: 1; }
    #volume-control label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: #888;
    }
    #volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 3px;
      border-radius: 2px;
      background: #444;
      outline: none;
      cursor: pointer;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #60a5fa;
      cursor: pointer;
    }
    #volume-slider::-moz-range-thumb {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #60a5fa;
      border: none;
      cursor: pointer;
    }
    #volume-pct {
      font-size: 0.65rem;
      color: #666;
      width: 30px;
    }
  </style>
</head>
<body>

<div class="panels">

  <!-- CLOCK -->
  <div class="panel">
    <span class="panel-label">Clock</span>
    <div class="display" id="clock-display">12:00:00 AM</div>
    <span id="clock-date"></span>
  </div>

  <div class="divider-h"></div>

  <!-- TIMER -->
  <div class="panel">
    <span class="panel-label">Timer</span>
    <div class="display" id="timer-display">01:15:00</div>

    <div class="input-row">
      <label>H</label>
      <input type="number" id="input-h" min="0" max="99" value="1">
      <label>M</label>
      <input type="number" id="input-m" min="0" max="59" value="15">
      <label>S</label>
      <input type="number" id="input-s" min="0" max="59" value="0">
    </div>

    <div class="controls">
      <button id="btn-start">Start</button>
      <button id="btn-pause">Pause</button>
      <button id="btn-reset">Reset</button>
    </div>
  </div>

</div>

<div id="audio-test">
  <span class="test-label">TEST</span>
  <button onclick="playWarning('30min_warning.mp3')">30m</button>
  <button onclick="playWarning('15min_warning.mp3')">15m</button>
  <button onclick="playWarning('5min_warning.mp3')">5m</button>
  <button onclick="(()=>{const a=new Audio('alarm.wav');a.volume=Math.min(1,parseInt(volumeSlider.value)/100);a.play().catch(()=>{});setTimeout(()=>{a.pause();a.currentTime=0;},3000);})()">ALM</button>
</div>

<div id="volume-control">
  <label>VOL</label>
  <input type="range" id="volume-slider" min="0" max="150" value="100" step="1">
  <span id="volume-pct">100%</span>
</div>

<script>
  // ── Font sizing ─────────────────────────────────────────
  // Clock "12:34:56 PM" = 11 chars (widest), Timer "00:00:00" = 8 chars.
  // Courier New monospace char width ≈ 0.601× font-size.
  // Fixed overhead (px): labels, date, inputs, buttons, gaps, bottom bar.
  const CLOCK_FIXED_PX  = 16 + 16 + 10 + 10; // panel-label + clock-date + gaps
  const TIMER_FIXED_PX  = 16 + 38 + 46 + 10 + 10 + 10; // panel-label + inputs + buttons + gaps
  const BETWEEN_GAP_PX  = 24 + 1 + 24; // gap + divider + gap
  const VERT_PADDING_PX = 60; // body breathing room + bottom bar

  function fitFontSize() {
    const availW = window.innerWidth  * 0.92;
    const availH = window.innerHeight
                   - CLOCK_FIXED_PX - TIMER_FIXED_PX
                   - BETWEEN_GAP_PX - VERT_PADDING_PX;

    // Width: clock text is wider (11 chars)
    const byWidth  = availW / (11 * 0.601);
    // Height: two displays share available vertical space equally
    const byHeight = availH / 2;

    const size = Math.max(24, Math.floor(Math.min(byWidth, byHeight)));

    document.getElementById('clock-display').style.fontSize = size + 'px';
    document.getElementById('timer-display').style.fontSize = size + 'px';
  }

  window.addEventListener('resize', fitFontSize);
  fitFontSize();

  // ── Clock ───────────────────────────────────────────────
  function updateClock() {
    const now  = new Date();
    const pad  = n => String(n).padStart(2, '0');
    const h12  = now.getHours() % 12 || 12;
    const ampm = now.getHours() < 12 ? 'AM' : 'PM';
    document.getElementById('clock-display').textContent =
      h12 + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds()) + ' ' + ampm;

    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('clock-date').textContent =
      days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ' ' + now.getFullYear();
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── Timer ───────────────────────────────────────────────
  const warnings = [
    { ms: 30 * 60 * 1000, file: '30min_warning.mp3', fired: false },
    { ms: 15 * 60 * 1000, file: '15min_warning.mp3', fired: false },
    { ms:  5 * 60 * 1000, file:  '5min_warning.mp3', fired: false },
  ];

  const volumeSlider = document.getElementById('volume-slider');
  const volumePct    = document.getElementById('volume-pct');
  volumeSlider.addEventListener('input', () => {
    volumePct.textContent = volumeSlider.value + '%';
  });

  function playWarning(file) {
    const audio = new Audio(file);
    audio.volume = Math.min(1, parseInt(volumeSlider.value) / 100);
    if (parseInt(volumeSlider.value) > 100) {
      const ctx  = new AudioContext();
      const src  = ctx.createMediaElementSource(audio);
      const gain = ctx.createGain();
      gain.gain.value = parseInt(volumeSlider.value) / 100;
      src.connect(gain);
      gain.connect(ctx.destination);
    }
    audio.play().catch(() => {});
  }

  function resetWarnings(startMs = 0) {
    warnings.forEach(w => w.fired = w.ms >= startMs);
  }

  let remainingMs = 0;
  let running     = false;
  let intervalId  = null;
  let endTime     = null;

  const display = document.getElementById('timer-display');

  function formatTime(ms) {
    const totalSec = Math.ceil(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    return [h, m, s].map(n => String(n).padStart(2, '0')).join(':');
  }

  function getInputMs() {
    const h = parseInt(document.getElementById('input-h').value) || 0;
    const m = parseInt(document.getElementById('input-m').value) || 0;
    const s = parseInt(document.getElementById('input-s').value) || 0;
    return (h * 3600 + m * 60 + s) * 1000;
  }

  function tick() {
    const left = endTime - Date.now();
    if (left <= 0) {
      display.textContent = '00:00:00';
      display.className = 'display';
      clearInterval(intervalId);
      running = false;
      remainingMs = 0;
      const alarm = new Audio('alarm.wav');
      alarm.volume = Math.min(1, parseInt(volumeSlider.value) / 100);
      if (parseInt(volumeSlider.value) > 100) {
        const ctx  = new AudioContext();
        const src  = ctx.createMediaElementSource(alarm);
        const gain = ctx.createGain();
        gain.gain.value = parseInt(volumeSlider.value) / 100;
        src.connect(gain);
        gain.connect(ctx.destination);
      }
      alarm.play().catch(() => {});
      setTimeout(() => { alarm.pause(); alarm.currentTime = 0; }, 3000);
      let flashes = 0;
      const flash = setInterval(() => {
        display.style.opacity = display.style.opacity === '0' ? '1' : '0';
        if (++flashes >= 8) { clearInterval(flash); display.style.opacity = '1'; }
      }, 300);
    } else {
      remainingMs = left;
      display.textContent = formatTime(left);
      for (const w of warnings) {
        if (!w.fired && left <= w.ms) {
          w.fired = true;
          playWarning(w.file);
        }
      }
    }
  }

  document.getElementById('btn-start').addEventListener('click', () => {
    if (running) return;
    if (remainingMs <= 0) {
      remainingMs = getInputMs();
      if (remainingMs <= 0) return;
      resetWarnings(remainingMs);
    }
    running = true;
    display.className = 'display running';
    endTime = Date.now() + remainingMs;
    intervalId = setInterval(tick, 250);
    tick();
  });

  document.getElementById('btn-pause').addEventListener('click', () => {
    if (!running) return;
    clearInterval(intervalId);
    running = false;
    display.className = 'display paused';
    remainingMs = Math.max(0, endTime - Date.now());
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    clearInterval(intervalId);
    running = false;
    remainingMs = 0;
    resetWarnings();
    document.getElementById('input-h').value = 1;
    document.getElementById('input-m').value = 15;
    document.getElementById('input-s').value = 0;
    display.textContent = '01:15:00';
    display.className = 'display';
  });
</script>
</body>
</html>
